<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      margin: 0;
    }
    h2 { font-size: 15px; margin: 0 0 4px; }
    p { font-size: 12px; color: #888; margin: 0 0 16px; }
    button {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:hover { background: #4f46e5; }
    button.secondary {
      background: #1a1a1a;
      border: 1px solid #333;
    }
    button.secondary:hover { background: #222; }
    .status { font-size: 11px; color: #888; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>📱 Reels Dashboard</h2>
  <p>Aktuellen Reel speichern</p>

  <button id="saveBtn">💾 Diesen Reel speichern</button>
  <button class="secondary" id="openBtn">🔗 Dashboard öffnen</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
